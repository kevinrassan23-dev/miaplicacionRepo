name: Integración Continua Java

# ¿Cuándo se ejecuta esto?
on:
  push:
    # Para que lo haga en todas la ramas
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # <- Fuerza Node.js 24

# ¿Qué tareas va a realizar?
jobs:
  build:
    runs-on: ubuntu-latest # Máquina virtual donde se ejecutará

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar el entorno de Java (JDK 25)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 3. Ejecutar las pruebas unitarias con Maven
        run: mvn test